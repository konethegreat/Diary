<!doctype html>
<html lang="en" data-theme="{{ request.cookies.get('theme', 'dark') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121014">
  <title>{% block title %}Diary{% endblock %}</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"
          integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
          crossorigin="anonymous" defer></script>
  <script src="/static/init.js" defer></script>
</head>
<body>
  <div class="shell">
    {% block nav %}
    <nav>
      <span class="logo">✦ Diary</span>
      <a href="/" class="{{ 'active' if active == 'diary' }}">Today</a>
      <a href="/calendar" class="{{ 'active' if active == 'calendar' }}">Calendar</a>
      <a href="/topics" class="{{ 'active' if active == 'topics' }}">Topics</a>
      <a href="/review" class="{{ 'active' if active == 'review' }}">Review</a>
      <a href="/coach" class="{{ 'active' if active == 'coach' }}">Coach</a>
      <a href="/chat" class="{{ 'active' if active == 'chat' }}">Ask</a>
      <span class="spacer"></span>
      {% block navextra %}{% endblock %}
      <button class="btn-icon" title="Toggle light/dark"
              hx-post="/api/theme" hx-swap="none">
        {{ "☀️" if request.cookies.get('theme', 'dark') == 'dark' else "🌙" }}
      </button>
      <a href="/logout" class="btn-icon" title="Sign out" style="text-decoration:none">⎋</a>
    </nav>
    {% endblock %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
